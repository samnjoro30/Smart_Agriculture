server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: smart-farm-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Optional: if you want to query Docker API directly
        refresh_interval: 5s

    static_configs:
      - targets:
          - localhost
        labels:
          job: smart-farm-api
          service: backend
          env: development
          __path__: /var/lib/docker/containers/*/*-json.log
    
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs: attrs
      
      - json:
          source: output
          expressions:
            level: level
            event: event
            status_code: status_code
            duration: duration
      - labels:
          level:
          status_code: