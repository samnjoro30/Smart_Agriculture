  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   environment:
  #     - NODE_ENV=development
  #   command: pnpm dev
  
  # production
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    
    # volumes:
    #   - ./backend/logs:/app/logs
    depends_on:
      - db
  # next-prod:
  #   build:
  #     context: ./frontend
  #     target: runner
  #   ports:
  #     - "3005:3000"

  #   environment:
  #     - NODE_ENV=production

  #   restart: unless-stopped
  # frontend:
  #   build: ./frontend
  #   ports: 
  #     - "3000:3000"
  #   environment:
  #     - NEXT_RENDER_URL
  #   depends_on:
  #     - backend
  
  prometheus:
    image: prom/prometheus:latest
    container_name: smart-farm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  
  loki:
    image: grafana/loki:latest
    container_name: smart-farm-loki
    ports:
      - "3100:3100"
  
  promtail:
    image: grafana/promtail:latest
    container_name: smart-farm-promtail
    user: "0:0"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/prometheus/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    
  grafana:
    image: grafana/grafana:latest
    container_name: smart-farm-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: {}
      
